server:
  port: 8080

app:
  jwt:
    secret: ${APP_JWT_SECRET:super-secret-key-that-should-be-replaced-in-production}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transport_db}
    username: ${SPRING_DATASOURCE_USERNAME:kinfe}
    password: ${SPRING_DATASOURCE_PASSWORD:transport123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB